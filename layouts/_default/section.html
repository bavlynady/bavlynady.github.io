<!-- layouts/_default/section.html -->
{{ define "main" }}
  <div class="content">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    <div class="default-section-list">
      {{ range .Sections }}
        <div class="default-section-item">
          <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          <p>{{ .Params.description }}</p>
        </div>
      {{ else }}
        <p>No subsections available.</p>
      {{ end }}
      {{ range .Pages }}
        <div class="default-page-item">
          <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          <p>{{ .Summary }}</p>
        </div>
      {{ end }}
    </div>
  </div>
{{ end }}
